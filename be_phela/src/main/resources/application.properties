# ===================================================================
# CORE CONFIGURATION (FOR RENDER DEPLOYMENT)
# ===================================================================
# Database Configuration - These values will be read from Render's Environment Variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/phela}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# PostgreSQL-specific: Ensure zero date values (handled differently in Postgres)
# spring.datasource.hikari.data-source-properties.zeroDateTimeBehavior=convertToNull

# Hibernate Configuration for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Port - Render provides this automatically
server.port=${PORT:8081}

# JWT Secret Key - This should also be a secret environment variable
jwt.signer-key=${JWT_SIGNER_KEY:12345678901234567890123456789012}

spring.main.lazy-initialization=true

# ===================================================================
# OTHER CONFIGURATIONS
# ===================================================================
# Application Configuration
app.base-url=${APP_BASE_URL:https://phela-backend-dyl7.onrender.com}

frontend.customer-url=${FRONTEND_CUSTOMER_URL:http://localhost:3001}
frontend.admin-url=${FRONTEND_ADMIN_URL:http://localhost:3000}



# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,https://phela-customer-w519.onrender.com,https://phela-admin.onrender.com}

# Email Configuration - IMPORTANT: Move these to Environment Variables on Render
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

SENDGRID_API_KEY=${SENDGRID_API_KEY:your_sendgrid_key}

# Cloudinary Configuration - IMPORTANT: Move these to Environment Variables on Render
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# PayOS Configuration - IMPORTANT: Move these to Environment Variables on Render
payos.client-id=${PAYOS_CLIENT_ID:your_payos_id}
payos.api-key=${PAYOS_API_KEY:your_payos_key}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:your_payos_checksum}
payos.return-url=${PAYOS_RETURN_URL:https://phela-backend-dyl7.onrender.com/api/payment/payment-return}
payos.cancel-url=${PAYOS_CANCEL_URL:https://phela-backend-dyl7.onrender.com/api/payment/payment-cancel}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
# Standard Redirect URI for Spring Security OAuth2
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
